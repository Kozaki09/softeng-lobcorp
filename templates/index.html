<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagknows</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💗</text></svg>"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='scripts/loadComponents.js') }}" defer></script>
  </head>
  <body>
    <div class="container flex direction-column">
      <!-- Header Component -->
      <div id="header">{% include "components/header.html" %}</div>

      <main>
        <section>
          <div class="home-content">
            <div class="card">
              <div
                class="card-header flex align-center justify-between flex-wrap">
                <h2>Home</h2>
                <div class="form flex align-center">
                  <label for="form-type" class="form-label">Select Form:</label>
                  <select id="form-type" class="form-select">
                    <option value="basic">Basic</option>
                    <option value="advanced">Advanced</option>
                  </select>
                </div>
              </div>

              <form>
                <h2>Basic Mode (Home-Accessible Inputs)</h2>

                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Age</label>
                    <input
                      type="number"
                      name="age"
                      class="form-input"
                      min="1"
                      required />
                  </div>

                  <div class="form-group">
                    <label class="form-label">Sex</label>
                    <select name="sex" class="form-select" required>
                      <option value>Select</option>
                      <option value="0">Female</option>
                      <option value="1">Male</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">Resting Systolic Blood Pressure
                    (mmHg)</label>
                  <input
                    type="number"
                    name="trestbps"
                    class="form-input"
                    required />
                </div>

                <div class="form-group">
                  <label class="form-label">Total Cholesterol (mg/dl)
                    (optional)</label>
                  <input type="number" name="chol" class="form-input" />
                </div>

                <div class="form-group">
                  <label class="form-label">Fasting Blood Sugar &gt; 120 mg/dl
                    (optional)</label>
                  <select name="fbs" class="form-select">
                    <option value>Select</option>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                  </select>
                </div>

                <div class="form-group">
                  <label class="form-label">Chest Pain Type</label>
                  <select name="cp" class="form-select" required>
                    <option value>Select</option>
                    <option value="0">Typical Angina</option>
                    <option value="1">Atypical Angina</option>
                    <option value="2">Non-anginal Pain</option>
                    <option value="3">Asymptomatic</option>
                  </select>
                </div>

                <div class="form-group">
                  <label class="form-label">Exercise-Induced Chest Pain</label>
                  <select name="exang" class="form-select" required>
                    <option value>Select</option>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                  </select>
                </div>

                <div class="advanced-section hidden">
                  <h2>Advanced Mode (Clinical / Diagnostic Inputs)</h2>

                  <div class="form-group">
                    <label class="form-label">Resting ECG Result</label>
                    <select name="restecg" class="form-select">
                      <option value>Select</option>
                      <option value="0">Normal</option>
                      <option value="1">ST-T Wave Abnormality</option>
                      <option value="2">Left Ventricular Hypertrophy</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="form-label">Maximum Heart Rate
                      (thalach)</label>
                    <input type="number" name="thalach" class="form-input" />
                  </div>

                  <div class="form-group">
                    <label class="form-label">ST Depression (oldpeak)</label>
                    <input
                      type="number"
                      step="0.1"
                      name="oldpeak"
                      class="form-input" />
                  </div>

                  <div class="form-group">
                    <label class="form-label">Slope of ST Segment</label>
                    <select name="slope" class="form-select">
                      <option value>Select</option>
                      <option value="0">Upsloping</option>
                      <option value="1">Flat</option>
                      <option value="2">Downsloping</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="form-label">Number of Major Vessels
                      (ca)</label>
                    <input
                      type="number"
                      name="ca"
                      class="form-input"
                      min="0"
                      max="3" />
                  </div>

                  <div class="form-group">
                    <label class="form-label">Thallium Stress Test
                      Result</label>
                    <select name="thal" class="form-select">
                      <option value>Select</option>
                      <option value="1">Normal</option>
                      <option value="2">Fixed Defect</option>
                      <option value="3">Reversible Defect</option>
                    </select>
                  </div>
                </div>
                <button type="submit" class="form-button">Analyze Risk</button>
              </form>
            </div>
            
            <div class="status card">
              <div
                class="card-header flex align-center justify-between flex-wrap">
                <h2>Status (Static)</h2>
                <p class="pill">status content here!</p>
              </div>

              <p class="muted">User: <span class="mono">Guest</span></p>
              <p class="muted">Plan: <span class="mono">None</span></p>
            </div>
          </section>
        </main>

      <!-- Footer Component -->
      <div id="footer">{% include "components/footer.html" %}</div>
    </div>
  </body>
</html>
