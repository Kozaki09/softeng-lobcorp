<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagknows</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='scripts/loadComponents.js') }}" defer></script>
  </head>
  <body>
    <div class="container flex direction-column">
      <!-- Header Component -->
      <div id="header"></div>

      <main>
        <section>
          <div class="home-content">
            <div class="card">
              <div
                class="card-header flex align-center justify-between flex-wrap"
              >
                <h2>Home</h2>

                <p class="pill">Basic</p>
              </div>

              <form action="/predict" method="post" class="risk-form">
                <div class="form-group">
                  <label for="age">Age</label>
                  <input type="number" id="age" name="age" required min="0" />
                </div>

                <div class="form-group">
                  <label for="sex">Sex</label>
                  <select id="sex" name="sex" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="bp">Blood Pressure (mmHg, e.g. 120/80)</label>
                  <input type="text" id="bp" name="blood_pressure" required pattern="\d{1,3}\/\d{1,3}" placeholder=" " />
                </div>

                <div class="form-group">
                  <label for="cholesterol">Cholesterol (mg/dl) <span class="optional">(optional)</span></label>
                  <input type="number" id="cholesterol" name="cholesterol" min="0" step="any" />
                </div>

                <div class="form-group">
                  <label for="blood_sugar">Blood Sugar (mg/dl) <span class="optional">(optional)</span></label>
                  <input type="number" id="blood_sugar" name="blood_sugar" min="0" step="any" />
                </div>

                <div class="form-group">
                  <label for="chest_pain">Chest Pain Type</label>
                  <select id="chest_pain" name="chest_pain" required>
                    <option value="typical_angina">Typical Angina</option>
                    <option value="atypical_angina">Atypical Angina</option>
                    <option value="non_anginal_pain">Non-anginal Pain</option>
                    <option value="asymptomatic">Asymptomatic</option>
                  </select>
                </div>

                <div class="form-group">
                  <fieldset>
                    <legend>Exercise-induced Chest Pain</legend>
                    <label>
                      <input type="radio" name="exercise_induced" value="yes" required /> Yes
                    </label>
                    <label>
                      <input type="radio" name="exercise_induced" value="no" required /> No
                    </label>
                  </fieldset>
                </div>

                <button type="submit" class="btn">Submit</button>
              </form>
            </div>

            <div class="status card">
              <div
                class="card-header flex align-center justify-between flex-wrap"
              >
                <h2>Status (Static)</h2>
                <p class="pill">status content here!</p>
              </div>

              <p class="muted">User: <span class="mono">Guest</span></p>
              <p class="muted">Plan: <span class="mono">None</span></p>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer Component -->
      <div id="footer"></div>
    </div>
  </body>
</html>
